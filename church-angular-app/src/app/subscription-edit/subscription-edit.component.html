<div class="edit-container">
  <div class="header-row">
    <h2>Edit Subscription & Pledge Details</h2>
    <button type="button" class="btn-invoice" (click)='goToInvoice()'>
      📄 View/Generate Invoice
    </button>
  </div>

  <form [formGroup]="subscriptionForm" (ngSubmit)="onUpdate()">
    <div class="form-grid">
      <div class="form-group">
        <label>Total Pledge Amount</label>
        <input type="number" formControlName="pledgeAmount">
      </div>

      <div class="form-group">
        <label>Pledge Credit</label>
        <input type="number" formControlName="pledgeCredit">
      </div>

      <div class="form-group">
        <label>Current Pledge Due</label>
        <input type="number" formControlName="pledgeDue" readonly class="readonly-field">
      </div>

      <div class="form-group">
        <label>Last Pledge Due</label>
        <input type="number" formControlName="lastPledgeDue">
      </div>

      <div class="form-group">
        <label>Pledge Start Date</label>
        <input type="date" formControlName="pledgeStartDate">
      </div>

      <div class="form-group">
        <label>Last Deposit Date</label>
        <input type="date" formControlName="lastPledgeDepositDate">
      </div>

      <div class="form-group">
        <label>Last Deposit Amount</label>
        <input type="number" formControlName="lastPledgeDepositAmount">
      </div>
    </div>

    <div class="action-footer">
      <button type="submit" class="btn-save" [disabled]="!subscriptionForm.valid">
        Update Details
      </button>
    </div>
  </form>

  <div class="submit-section">
    <button class="btn-save" [disabled]="!subscriptionForm.valid" (click)="deductPledge()">
      Submit Pledge
    </button>
  </div>

  <!-- ── Payment Transactions Table Section ────────────────────────────────── -->
  <div class="transactions-container">
    <hr class="divider">
    <h3>Payment Transaction History</h3>

    <div class="table-responsive">
      <table class="tx-table">
        <thead>
          <tr>
            <th>Transaction ID</th>
            <th>Name</th>
            <th>Date</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody>
          <!-- Loop through the transactions array from your TypeScript file -->
          <tr *ngFor="let tx of paymentTransactionEntries">
            <td class="tx-id">{{ tx.transaction_id }}</td>
            <td>{{ tx.name }}</td>
            <!-- Formats the date (e.g., Oct 24, 2023) -->
            <td>{{ tx.date | date:'mediumDate' }}</td>
            <!-- Formats the amount as currency (e.g., $150.00) -->
            <td class="tx-amount">{{ tx.amount | currency: 'INR' }}</td>
          </tr>
          
          <!-- Fallback row if the array is empty or undefined -->
          <tr *ngIf="!paymentTransactionEntries || paymentTransactionEntries.length === 0">
            <td colspan="4" class="empty-state">No payment transactions found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
