<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #333; margin: 0; padding: 0; }
        .invoice-box { max-width: 800px; margin: 40px auto; padding: 30px; border: 1px solid #eee; box-shadow: 0 0 10px rgba(0, 0, 0, 0.15); font-size: 16px; line-height: 24px; }

        /* Header and Layout */
        .invoice-header { display: flex; justify-content: space-between; margin-bottom: 40px; border-bottom: 3px solid #333; padding-bottom: 20px; }
        .invoice-header h1 { margin: 0; font-size: 40px; text-transform: uppercase; color: #000; }

        .info-section { display: flex; justify-content: space-between; margin-bottom: 40px; }
        .info-block h3 { margin: 0 0 10px 0; border-bottom: 1px solid #ddd; display: inline-block; padding-right: 20px; }

        /* Table Design */
        table { width: 100%; border-collapse: collapse; text-align: left; }
        table th { background: #f9f9f9; border-bottom: 2px solid #333; padding: 12px; font-weight: bold; }
        table td { padding: 12px; border-bottom: 1px solid #eee; }

        /* Specific alignment for currency/numbers */
        .text-right { text-align: right; }

        /* Totals section matching the image layout */
        .totals-container { margin-top: 30px; display: flex; justify-content: flex-end; }
        .totals-table { width: 40%; }
        .totals-table td { border-bottom: none; padding: 5px 12px; }
        .grand-total { border-top: 2px solid #333 !important; font-weight: bold; font-size: 1.1em; }

        .footer { margin-top: 60px; text-align: center; font-size: 12px; color: #777; border-top: 1px solid #eee; padding-top: 20px; }

        @media print {
            .invoice-box { border: none; box-shadow: none; margin: 0; padding: 0; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

<div class="invoice-box">
    <div class="invoice-header">
        <div>
            <h1>Invoice</h1>
            <p>Invoice #: <span></span></p>
            <p>Date: <span></span></p>
        </div>
        <div style="text-align: right;">
            <strong>CENTRAL METHODIST CHURCH</strong><br>
            <br>
            <br>
        </div>
    </div>

    <div class="info-section">
        <div class="info-block">
            <h3>Bill To:</h3>
            <div><strong></strong></div>
            <div></div>
            <div></div>
        </div>
        <div class="info-block" style="text-align: right;">
            <h3>Payment Status:</h3>
            <div style="font-weight: bold; font-size: 1.2em;">
            </div>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>Subscription Name</th>
            <th>Subscription Type</th>
            <th class="text-right">Amount</th>
            <th class="text-right">Total</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td></td>
            <td></td>
            <td class="text-right"></td>
            <td class="text-right"></td>
        </tr>
        </tbody>
    </table>

    <div class="totals-container">
        <table class="totals-table">
            <tr>
                <td>Subtotal:</td>
                <td class="text-right"></td>
            </tr>
            <tr>
                <td>Tax/Other:</td>
                <td class="text-right"></td>
            </tr>
            <tr class="grand-total">
                <td><strong>Grand Total:</strong></td>
                <td class="text-right"><strong></strong></td>
            </tr>
        </table>
    </div>

    <div class="footer">
        <p>Thank you for your contribution.</p>
        <p>Generated by Church Management System</p>
    </div>
</div>

<div class="no-print" style="text-align: center; margin-top: 20px;">
    <button onclick="window.print()" style="padding: 10px 25px; background: #333; color: #fff; border: none; cursor: pointer; border-radius: 4px;">Print PDF</button>
</div>

</body>
</html>
